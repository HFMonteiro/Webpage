name: Site Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Validate static site
      run: node scripts/validate_site.js

    - name: Install browser test runner
      run: |
        npm init -y
        npm install --no-save @playwright/test
        npx playwright install --with-deps chromium

    - name: Browser smoke test
      run: |
        python3 -m http.server 4173 > /tmp/webpage-server.log 2>&1 &
        for i in $(seq 1 30); do
          if curl -fsS http://127.0.0.1:4173 >/dev/null; then
            break
          fi
          sleep 1
        done
        curl -fsS http://127.0.0.1:4173 >/dev/null
        SITE_BASE_URL=http://127.0.0.1:4173 npx playwright test scripts/smoke_site.spec.js --browser=chromium --reporter=line
