<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>A redirecionar para a versão portuguesa</title>
  
  <link rel="canonical" href="/pt/">
  <link rel="alternate" hreflang="en" href="/en/">
  <link rel="alternate" hreflang="pt-PT" href="/pt/">
  <link rel="alternate" hreflang="x-default" href="/pt/">

  <!-- Progressive enhancement redirect (prefer 301 at server/CDN) -->
  <script>
    (function () {
      var dest = '/pt/';
      if (location.pathname !== dest) {
        window.location.replace(dest);
      }
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/pt/">
  </noscript>
</head>
<body>
  <p>Se não for redirecionado, visite <a href="/pt/">/pt/</a>.</p>
</body>
</html>
